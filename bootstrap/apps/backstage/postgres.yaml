apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: backstage
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_PASSWORD
              value: "backstage" # In a real lab, use a Secret!
            - name: POSTGRES_USER
              value: "backstage"
            - name: POSTGRES_DB
              value: "backstage"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: backstage
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
