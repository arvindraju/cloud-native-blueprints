apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
  labels:
    app: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      containers:
        - name: backstage
          image: arvindraju/backstage:latest
          imagePullPolicy: Always
          command: ["node"]
          args: 
            - "packages/backend/dist/index.cjs.js"
            - "--config"
            - "app-config.yaml"
            - "--config"
            - "app-config.production.yaml"
          # END OF ADDED LINES
          env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "backstage"
            - name: POSTGRES_PASSWORD
              value: "backstage"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: GITHUB_TOKEN
          workingDir: /app
          command: ["yarn"]
          args: ["workspace", "backend", "start"]
          ports:
            - containerPort: 7007
              name: backend-port
          resources:
            limits:
              cpu: "1"
              memory: "1.5Gi"
            requests:
              cpu: "500m"
              memory: "768Mi"
