apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/arvindraju/cloud-native-blueprints.git
    targetRevision: HEAD
    path: bootstrap/apps/backstage
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
